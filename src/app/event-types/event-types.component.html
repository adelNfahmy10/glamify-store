<section class="event-types py-5 bg-white">
  <div class="container">
    <!-- Title & Subtitle -->
    <div class="text-center mb-5">
      <h2 class="fw-bold wow fadeInDown">{{ 'eventTypes.title' | translate}}</h2>
      <p class="text-muted fs-5 wow fadeInUp">{{ 'eventTypes.subtitle' | translate}}</p>
    </div>

    <!-- Event Cards -->
    <div class="row g-4 justify-content-center">
      <div class="col-6 col-md-4 col-lg-2 text-center">
        <div class="card h-100 shadow-sm border-0 p-3 wow fadeInUp">
          <div class="card-body">
            <div class="mb-3">
              <i class="fas fa-handshake fs-2"></i>
            </div>
            <h5 class="card-title fw-bold">{{ 'eventTypes.conferences' | translate}}</h5>
          </div>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2 text-center">
        <div class="card h-100 shadow-sm border-0 p-3 wow fadeInUp">
          <div class="card-body">
            <div class="mb-3">
              <i class="fas fa-glass-cheers fs-2"></i>
            </div>
            <h5 class="card-title fw-bold">{{ 'eventTypes.privateParties' | translate}}</h5>
          </div>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2 text-center">
        <div class="card h-100 shadow-sm border-0 p-3 wow fadeInUp">
          <div class="card-body">
            <div class="mb-3">
              <i class="fas fa-building fs-2"></i>
            </div>
            <h5 class="card-title fw-bold">{{ 'eventTypes.corporateEvents' | translate}}</h5>
          </div>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2 text-center">
        <div class="card h-100 shadow-sm border-0 p-3 wow fadeInUp">
          <div class="card-body">
            <div class="mb-3">
              <i class="fas fa-chalkboard-teacher fs-2"></i>
            </div>
            <h5 class="card-title fw-bold">{{ 'eventTypes.workshops' | translate}}</h5>
          </div>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2 text-center">
        <div class="card h-100 shadow-sm border-0 p-3 wow fadeInUp">
          <div class="card-body">
            <div class="mb-3">
              <i class="fas fa-landmark fs-2"></i>
            </div>
            <h5 class="card-title fw-bold">{{ 'eventTypes.exhibitions' | translate}}</h5>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
